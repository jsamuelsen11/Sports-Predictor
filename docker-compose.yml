services:
  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: sp-server
    user: "${UID:-1000}:${GID:-1000}"
    ports:
      - "8080:8080"
    volumes:
      - ./data:/app/data
    env_file:
      - .env
    environment:
      SPRING_AI_MCP_SERVER_STDIO: "false"
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      start_period: 30s
      retries: 5

  agent:
    build:
      context: .
      dockerfile: agent/Dockerfile
    container_name: sp-agent
    user: "${UID:-1000}:${GID:-1000}"
    ports:
      - "8081:8081"
    env_file:
      - .env
    environment:
      JAVA_TOOL_OPTIONS: -Dspring.ai.mcp.client.sse.connections.sports-server.url=${MCP_SERVER_URL:-http://server:8080}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
    depends_on:
      server:
        condition: service_healthy
