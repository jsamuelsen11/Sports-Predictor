server:
  port: 8081

spring:
  application:
    name: sports-predictor-agent
  ai:
    anthropic:
      api-key: ${ANTHROPIC_API_KEY:}
      chat:
        options:
          model: ${ANTHROPIC_MODEL:claude-sonnet-4-20250514}
          max-tokens: 8192
    chat:
      observations:
        include-input: true
        include-output: true
    mcp:
      client:
        enabled: true
        name: sports-agent
        version: 1.0.0
        type: SYNC
        request-timeout: 60s
        sse:
          connections:
            sports-server:
              url: http://localhost:8080

agent:
  strategy: moderate
  sports:
    - nba
    - nfl
    - mlb
    - nhl
  schedule:
    settle-cron: "0 0 8 * * *"
    scan-cron: "0 0 10 * * *"
    report-cron: "0 0 22 * * *"
  strategies:
    conservative:
      min-confidence: 0.70
      min-edge-pct: 5.0
      kelly-fraction: quarter
      max-bets-per-day: 2
      max-stake-pct: 1.0
      allowed-bet-types: MONEYLINE,SPREAD
      max-parlay-legs: 0
    moderate:
      min-confidence: 0.60
      min-edge-pct: 3.0
      kelly-fraction: half
      max-bets-per-day: 5
      max-stake-pct: 2.0
      allowed-bet-types: MONEYLINE,SPREAD,TOTAL,PARLAY
      max-parlay-legs: 3
    aggressive:
      min-confidence: 0.50
      min-edge-pct: 1.5
      kelly-fraction: full
      max-bets-per-day: 10
      max-stake-pct: 5.0
      allowed-bet-types: MONEYLINE,SPREAD,TOTAL,PARLAY,TEASER,PLAYER_PROP,FUTURES,SGP
      max-parlay-legs: 6

management:
  tracing:
    enabled: ${OTEL_TRACING_ENABLED:true}
    sampling:
      probability: ${OTEL_SAMPLING_PROBABILITY:1.0}
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318}/v1/traces
    metrics:
      export:
        enabled: ${OTEL_METRICS_ENABLED:true}
        url: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318}/v1/metrics
        step: ${OTEL_METRICS_STEP:30s}
    logging:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318}/v1/logs
  opentelemetry:
    resource-attributes:
      "service.name": sports-predictor-agent
      "service.version": 0.1.0
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  metrics:
    tags:
      application: sports-predictor-agent

logging:
  level:
    root: INFO
    com.sportspredictor.agent: INFO
    org.springframework.ai: INFO
