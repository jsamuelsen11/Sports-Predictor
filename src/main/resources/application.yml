server:
  port: 8080

spring:
  application:
    name: sports-predictor
  datasource:
    url: jdbc:sqlite:data/sports-predictor.db
    driver-class-name: org.sqlite.JDBC
  jpa:
    database-platform: org.hibernate.community.dialect.SQLiteDialect
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  ai:
    mcp:
      server:
        name: sports-predictor
        version: 1.0.0
        type: SYNC
        instructions: >-
          Sports prediction MCP server providing odds, stats, analysis,
          predictions, and emulated betting
        capabilities:
          tool: true
          resource: true
          prompt: true
          completion: true
        sse-message-endpoint: /mcp/messages
        stdio: true

resilience4j:
  ratelimiter:
    instances:
      odds-api:
        limit-for-period: 1
        limit-refresh-period: 90m
        timeout-duration: 0
      api-sports:
        limit-for-period: 1
        limit-refresh-period: 864s
        timeout-duration: 0
      espn:
        limit-for-period: 10
        limit-refresh-period: 1m
        timeout-duration: 0
      open-meteo:
        limit-for-period: 30
        limit-refresh-period: 1m
        timeout-duration: 0
  circuitbreaker:
    instances:
      odds-api:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 60s
        permitted-number-of-calls-in-half-open-state: 3
      api-sports:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 60s
        permitted-number-of-calls-in-half-open-state: 3
      espn:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 60s
        permitted-number-of-calls-in-half-open-state: 3
      open-meteo:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 60s
        permitted-number-of-calls-in-half-open-state: 3
  retry:
    instances:
      odds-api:
        max-attempts: 3
        wait-duration: 1s
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
        retry-exceptions:
          - java.io.IOException
          - java.net.SocketTimeoutException
          - org.springframework.web.client.ResourceAccessException
      api-sports:
        max-attempts: 3
        wait-duration: 1s
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
        retry-exceptions:
          - java.io.IOException
          - java.net.SocketTimeoutException
          - org.springframework.web.client.ResourceAccessException
      espn:
        max-attempts: 3
        wait-duration: 1s
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
        retry-exceptions:
          - java.io.IOException
          - java.net.SocketTimeoutException
          - org.springframework.web.client.ResourceAccessException
      open-meteo:
        max-attempts: 3
        wait-duration: 1s
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
        retry-exceptions:
          - java.io.IOException
          - java.net.SocketTimeoutException
          - org.springframework.web.client.ResourceAccessException

logging:
  level:
    root: INFO
    com.sportspredictor: INFO
    org.springframework.ai: INFO
