server:
  port: 8080

spring:
  application:
    name: sports-predictor
  datasource:
    url: jdbc:sqlite:data/sports-predictor.db
    driver-class-name: org.sqlite.JDBC
  jpa:
    database-platform: org.hibernate.community.dialect.SQLiteDialect
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  ai:
    mcp:
      server:
        name: sports-predictor
        version: 1.0.0
        type: SYNC
        instructions: >-
          Sports prediction MCP server providing odds, stats, analysis,
          predictions, and emulated betting
        capabilities:
          tool: true
          resource: true
          prompt: true
          completion: true
        sse-message-endpoint: /mcp/messages
        stdio: true

logging:
  level:
    root: INFO
    com.sportspredictor: INFO
    org.springframework.ai: INFO
