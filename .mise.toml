[tools]
actionlint = "latest"
gitleaks = "latest"
gradle = "9"
java = "temurin-25"
lefthook = "latest"
markdownlint-cli2 = "latest"
"pipx:gitfluff" = "latest"
prettier = "latest"
shellcheck = "latest"
shfmt = "latest"
taplo = "latest"
yamllint = "latest"

[env]
LEFTHOOK_FILE_NAME = ".config/lefthook.yml"

[tasks.build]
description = "Full build with tests"
run = "./gradlew build"

[tasks.test]
description = "Run all tests"
run = "./gradlew test"

[tasks."test:unit"]
description = "Unit tests only"
run = "./gradlew test --tests '*Unit*'"

[tasks."test:integration"]
description = "Integration tests only"
run = "./gradlew test --tests '*Integration*'"

[tasks.format]
description = "Auto-format code"
run = "./gradlew spotlessApply"

[tasks."format:check"]
description = "Check formatting (no changes)"
run = "./gradlew spotlessCheck"

[tasks.lint]
description = "Run linters"
run = "./gradlew checkstyleMain spotbugsMain"

[tasks.coverage]
description = "Generate coverage report"
run = "./gradlew jacocoTestReport"

[tasks.run]
description = "Start MCP server (WebMVC mode)"
run = "./gradlew bootRun"

[tasks."run:stdio"]
description = "Start in STDIO mode"
run = "./gradlew bootRun --args='--spring.ai.mcp.server.stdio=true'"

[tasks."db:migrate"]
description = "Run database migrations"
run = "./gradlew flywayMigrate"

[tasks."db:clean"]
description = "Reset database"
run = "./gradlew flywayClean"

[tasks.clean]
description = "Clean build artifacts"
run = "./gradlew clean"

[tasks.check]
depends = ["format:check", "lint", "test", "coverage"]
description = "Full quality gate"

# Docker
[tasks."docker:up"]
description = "Start server + agent (no observability)"
run = "docker compose -f docker-compose.yml up -d"

[tasks."docker:up:full"]
description = "Start server + agent + observability stack"
run = "docker compose up -d"

[tasks."docker:down"]
description = "Stop all containers"
run = "docker compose down"

[tasks."docker:build"]
description = "Build Docker images"
run = "docker compose build"

[tasks."docker:logs"]
description = "Tail container logs"
run = "docker compose logs -f"

# Agent workflows
[tasks."agent:settle"]
description = "Trigger settlement workflow"
run = "curl -s -X POST http://localhost:8081/api/workflows/settle | python3 -m json.tool"

[tasks."agent:scan"]
description = "Trigger scan & bet workflow"
run = "curl -s -X POST http://localhost:8081/api/workflows/scan-and-bet | python3 -m json.tool"

[tasks."agent:report"]
description = "Trigger daily report workflow"
run = "curl -s -X POST http://localhost:8081/api/workflows/report | python3 -m json.tool"

[tasks."agent:cycle"]
description = "Run full daily cycle (settle → scan → report)"
run = "curl -s -X POST http://localhost:8081/api/workflows/full-cycle | python3 -m json.tool"
